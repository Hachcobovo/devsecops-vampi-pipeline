name: DevSecOps Pipeline

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t vampi .

  semgrep:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/security-audit

  sonarqube:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  snyk:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run snyk
        uses: snyk/actions/python@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
          args: --severity-threshold=high

  zap_scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Start vulnerable application
        run: docker compose up -d vampi-vulnerable

      - name: Wait for app
        run: sleep 30

      - name: Check running containers
        run: docker ps

      - name: Check app logs
        run: docker compose logs vampi-vulnerable

      - name: ZAP Scan
        uses: zaproxy/action-api-scan@v0.8.0
        with:
          target: 'http://localhost:5002/openapi.json'
          format: openapi
          allow_issue_writing: false
          fail_action: true
          artifact_name: ''