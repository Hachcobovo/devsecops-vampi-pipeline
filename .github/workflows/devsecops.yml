name: DevSecOps Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: "Build Docker Image"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t vampi:latest .

      - name: Verify image exists
        run: docker images vampi:latest

  sast_semgrep:
    name: "SAST - Semgrep"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep SAST
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/python
            p/flask
            p/owasp-top-ten
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        # continue-on-error: true để pipeline không chết ở đây
        # Xóa dòng này khi muốn Quality Gate thật sự
        continue-on-error: true

  sast_sonarqube:
    name: "SAST - SonarCloud"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies + test tools
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests with coverage
        run: |
          pytest --cov=. \
                 --cov-report=xml:coverage.xml \
                 --cov-report=term-missing \
                 --omit="tests/*,*/__pycache__/*" \
                 -v
        # Nếu test fail thì vẫn tiếp tục để SonarCloud nhận coverage
        continue-on-error: true

      - name: Fix coverage.xml paths for SonarCloud
        run: |
          # SonarCloud cần đường dẫn tương đối, pytest sinh ra đường dẫn tuyệt đối
          # Lệnh này strip phần /home/runner/work/repo/repo/ ra khỏi mỗi dòng filename
          sed -i 's|/home/runner/work/[^/]*/[^/]*/||g' coverage.xml
          # Kiểm tra kết quả — phải thấy filename="app.py" thay vì đường dẫn dài
          head -20 coverage.xml

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: "https://sonarcloud.io"

      - name: SonarCloud Quality Gate Check
        uses: sonarsource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: "https://sonarcloud.io"
        # Bước này sẽ FAIL nếu SonarCloud phát hiện lỗ hổng high/critical
        # Đây chính là Quality Gate!

  sca_snyk:
    name: "SCA - Snyk"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies (để Snyk phân tích)
        run: pip install -r requirements.txt

      - name: Run Snyk SCA Scan
        uses: snyk/actions/python@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
          args: >-
            --severity-threshold=high
            --file=requirements.txt
            --package-manager=pip
        # VAmPI dùng thư viện cũ có CVE cố ý → sẽ FAIL
        # continue-on-error: true  ← bỏ comment khi muốn xem báo cáo trước khi fix
        continue-on-error: true

  dast_zap:
    name: "DAST - OWASP ZAP"
    needs: [build, sast_semgrep, sca_snyk]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start vulnerable app via Docker Compose
        run: |
          docker compose up -d vampi-vulnerable
          echo "Waiting for app to start..."

      - name: Wait until app is ready (health check)
        run: |
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5002/ || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" != "000" ]; then
              echo "App is ready!"
              break
            fi
            sleep 3
          done

      - name: Run ZAP API Scan
        uses: zaproxy/action-api-scan@v0.9.0
        with:
          target: "http://localhost:5002/openapi.json"
          format: openapi
          # File config rules định nghĩa cái gì FAIL/WARN/IGNORE
          rules_file_name: ".zap/rules.tsv"
          # false = ZAP báo cáo nhưng không tự fail job
          # Để Quality Gate hoạt động thì để true sau khi fix xong
          fail_action: false
          cmd_options: "-a"

      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-scan-report
          path: report_html.html